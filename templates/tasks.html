<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Создание задачи</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div id="name_site">
        <h1>Список задач</h1>
    </div>
    <div class="parent">
        <!-- Панел инструментов -->
        <div class="toolbar">
            <img src=" " alt="фото профиля пользователя">
            <p>Имя пользователя</p>
        </div>

        <div class="menu">
            <ul class="menu-item">
                <li class="menu-link"><a href="{{ url_for('tasks') }}">Создать задачу</a></li>
                <li class="menu-link"><a href="{{ url_for('index') }}">Список задач</a></li>
                <li class="nmenu-link"><a href="{{ url_for('statistics') }}">Статистика выполнения</a></li>
                <li class="menu-link"><a href="{{ url_for('user') }}">Настройки профиля</a></li>
            </ul>
        </div>
        <!-- конеу панели инструментов -->
        <div class="create_tools">
            <form method="post" action="">
                <!-- TODO: Пометить обязательные поля маленькой красной звездочкой-->
                <label for="name_tools">Название задачи</label>
                <input type="text" id="name_tools" name="name_tools" placeholder="Введите название задачи">
                <label for="description">Описание задачи</label>
                <textarea id="description" name="description" placeholder="Введите описание вашей задачи"></textarea>
                <button type="submit">Создать!</button>
            </form>
        </div>
    </div>

</body>
</html>
